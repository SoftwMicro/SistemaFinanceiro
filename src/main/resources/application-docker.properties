# Spring Profile: docker
# Use this profile when running the application inside a Docker container (WSL/Linux)
# Activate with: --spring.profiles.active=docker  or  -e SPRING_PROFILES_ACTIVE=docker

# For WSL/Linux Docker: connect via localhost or the actual hostname
# Override with env var if needed: -e SPRING_DATASOURCE_URL="jdbc:mysql://mysql-container:3306/..."
spring.datasource.url=jdbc:mysql://localhost:3306/pedidos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:010101}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


