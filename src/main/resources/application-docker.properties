# Spring Profile: docker
# Use this profile when running the application inside a Docker container
# Activate with: --spring.profiles.active=docker  or  -e SPRING_PROFILES_ACTIVE=docker

# For Windows Docker Desktop: connect via host.docker.internal (Docker's special hostname for the host machine)
# For Linux Docker: connect via container name (e.g., mysql-financeiro) or use --network flag
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/pedidos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:010101}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

