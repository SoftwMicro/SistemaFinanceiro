# Spring Profile: container
# Use this profile when running inside Docker with MySQL in another container on the same network
# Activate with: --spring.profiles.active=container  or  -e SPRING_PROFILES_ACTIVE=container

# Replace 'mysql-financeiro' with the actual name of your MySQL container
spring.datasource.url=jdbc:mysql://mysql-financeiro:3306/pedidos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:010101}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

